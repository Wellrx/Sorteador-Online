<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Sorteador Online | Gere números aleatórios</title>
</head>

<body>
    <header>
        <img src="./assets/sorteio.png" alt="Ilustração de um sorteio">
    </header>

         <h1>Sortear um Número</h1>
         
    <main id="principal">
        <input type="number" id="min-number" class="number-input" placeholder="De" min="0">
        <input type="number" id="max-number" class="number-input" placeholder="Até" min="0">
        <h2 id="result"></h2>
        <button id="button" type="button">
            Sortear
        </button>
    </main>
    
    <script src="./scripts.js"></script>
</body>

</html>
